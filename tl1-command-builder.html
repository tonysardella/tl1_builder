<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TL1 Command Builder — Multi-Vendor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{font-family:'IBM Plex Mono','Courier New',monospace;background:#0d1117;color:#c9d1d9;overflow:hidden}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:268px;min-width:268px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #30363d}
.logo{font-size:11px;font-weight:700;letter-spacing:3px;color:#58a6ff;text-transform:uppercase}
.logo-sub{font-size:10px;color:#6e7681;letter-spacing:1px;margin-top:2px}
.vendor-row{display:flex;flex-wrap:wrap;gap:4px;padding:9px 14px;border-bottom:1px solid #30363d}
.vendor-chip{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid #30363d;cursor:pointer;background:transparent;color:#8b949e;transition:all 0.15s;white-space:nowrap;font-family:inherit;letter-spacing:0.4px}
.vendor-chip.active{border-color:#58a6ff;color:#58a6ff;background:rgba(88,166,255,0.08)}
.vendor-chip.nortel-chip.active{border-color:#e3b341;color:#e3b341;background:rgba(227,179,65,0.08)}
.search-wrap{padding:8px 14px;border-bottom:1px solid #30363d}
.search-input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#c9d1d9;font-size:12px;font-family:inherit;outline:none}
.search-input:focus{border-color:#58a6ff}
.cmd-list{flex:1;overflow-y:auto}
.cat-label{padding:8px 14px 3px;font-size:10px;letter-spacing:2px;color:#6e7681;text-transform:uppercase}
.cmd-item{padding:6px 14px;cursor:pointer;border-left:2px solid transparent;transition:all 0.1s}
.cmd-item:hover{background:rgba(88,166,255,0.05);border-left-color:#30363d}
.cmd-item.active{background:rgba(88,166,255,0.1);border-left-color:#58a6ff}
.cmd-name{font-size:11px;font-weight:600;color:#e6edf3;letter-spacing:0.5px}
.cmd-desc{font-size:10px;color:#6e7681;margin-top:1px;line-height:1.3}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{padding:12px 18px;border-bottom:1px solid #30363d;background:#161b22;flex-shrink:0}
.top-title{font-size:13px;font-weight:700;color:#e6edf3;letter-spacing:1px}
.top-desc{font-size:11px;color:#6e7681;margin-top:2px}
.vendor-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.vbadge{font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(88,166,255,0.1);color:#58a6ff;border:1px solid rgba(88,166,255,0.2);letter-spacing:0.3px}
.vbadge.nortel{background:rgba(255,166,0,0.1);color:#e3b341;border-color:rgba(255,166,0,0.25)}
.content{flex:1;display:flex;overflow:hidden}
.params-panel{width:350px;min-width:290px;border-right:1px solid #30363d;overflow-y:auto;padding:14px}
.output-panel{flex:1;padding:14px;display:flex;flex-direction:column;overflow:hidden}
.sec-title{font-size:10px;letter-spacing:2px;color:#6e7681;text-transform:uppercase;margin-bottom:10px}
.param-group{margin-bottom:11px}
.param-label{font-size:11px;color:#8b949e;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.param-req{color:#f85149;font-size:10px}
.param-help{font-size:10px;color:#484f58;margin-top:3px;line-height:1.4}
.param-input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:6px 9px;color:#c9d1d9;font-size:12px;font-family:inherit;outline:none}
.param-input:focus{border-color:#58a6ff}
.param-select{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:6px 9px;color:#c9d1d9;font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.param-select:focus{border-color:#58a6ff}
.output-box{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:14px;overflow-y:auto}
.cmd-out{font-size:13px;color:#79c0ff;word-break:break-all;line-height:1.9;letter-spacing:0.5px}
.cmd-ph{font-size:12px;color:#30363d;font-style:italic}
.tmpl-box{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:11px}
.tmpl-txt{font-size:11px;color:#6e7681;line-height:1.8;word-break:break-all}
.tmpl-hl{color:#d2a8ff}
.actions{display:flex;gap:8px;margin-top:10px;align-items:center}
.btn{padding:6px 14px;border-radius:5px;font-size:11px;font-family:inherit;cursor:pointer;border:1px solid;letter-spacing:0.5px;transition:all 0.15s;font-weight:600}
.btn-ok{background:#238636;border-color:#2ea043;color:#fff}
.btn-ok:hover{background:#2ea043}
.btn-sec{background:transparent;border-color:#30363d;color:#8b949e}
.btn-sec:hover{border-color:#6e7681;color:#c9d1d9}
.btn-clr{background:transparent;border-color:#30363d;color:#6e7681}
.btn-clr:hover{border-color:#f85149;color:#f85149}
.hist-item{background:#161b22;border:1px solid #21262d;border-radius:5px;padding:7px 11px;margin-bottom:6px;cursor:pointer;transition:border-color 0.15s}
.hist-item:hover{border-color:#30363d}
.hist-cmd{font-size:11px;color:#79c0ff;word-break:break-all}
.hist-meta{font-size:10px;color:#484f58;margin-top:2px}
.empty-st{display:flex;align-items:center;justify-content:center;height:100%;color:#30363d;font-size:12px;letter-spacing:2px}
.tabs{display:flex;border-bottom:1px solid #30363d;margin-bottom:12px}
.tab{padding:6px 12px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:#6e7681;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;letter-spacing:0.4px}
.tab.active{border-bottom-color:#58a6ff;color:#58a6ff}
.cbadge{font-size:10px;background:#30363d;color:#8b949e;border-radius:10px;padding:1px 6px;margin-left:4px}
.copy-ok{font-size:10px;color:#3fb950;opacity:0;transition:opacity 0.3s}
.copy-ok.show{opacity:1}
.no-match{padding:14px;font-size:11px;color:#484f58}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;

const VENDORS={
  generic:{label:"Generic / Standard"},
  ciena:{label:"Ciena"},
  nokia:{label:"Nokia"},
  cisco:{label:"Cisco"},
  adtran:{label:"Adtran"},
  calix:{label:"Calix"},
  daxs5:{label:"Nortel DXS-5"},
  daxs4:{label:"Nortel DXS-4"},
};
const ALL=["generic","ciena","nokia","cisco","adtran","calix","daxs5","daxs4"];
const SONET=["generic","ciena","nokia","cisco","adtran"];
const NORTEL=["daxs5","daxs4"];
const ETH_V=["generic","ciena","nokia","cisco","adtran","calix"];
const DWDM_V=["generic","ciena","nokia","cisco"];

const COMMANDS={
  RTRV_ALM:{label:"RTRV-ALM",category:"Alarms",description:"Retrieve active alarms on any facility or entity",vendors:ALL,
    template:"RTRV-ALM-{aid_type}:[{tid}]:{aid}:{ctag}::{ntfcncde},{condtype},{srveff},{locn},{dirn},{tmper};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false,help:"Leave blank for local NE."},
      {id:"aid_type",label:"AID Type",type:"select",options:["ALL","T1","T3","DS0","DS1","DS3","OC3","OC12","OC48","OC192","ETH","STS1","STS3C","STS12C","VT1","VT15","DSG","DWDM","OCH"],required:true},
      {id:"aid",label:"AID",type:"text",placeholder:"ALL",required:true,help:"Use ALL or specify e.g. 1-1-1."},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true,help:"Max 6 alphanumeric chars."},
      {id:"ntfcncde",label:"Notification Code",type:"select",options:["","CR","MJ","MN","WN","NA","NR"],required:false,help:"CR=Critical  MJ=Major  MN=Minor  WN=Warning  NA=Not Alarmed  NR=Not Reported"},
      {id:"condtype",label:"Condition Type",type:"text",placeholder:"LOS or ALL",required:false},
      {id:"srveff",label:"Service Effect",type:"select",options:["","SA","NSA"],required:false,help:"SA=Service Affecting  NSA=Non-Service Affecting"},
      {id:"locn",label:"Location",type:"select",options:["","NEND","FEND"],required:false},
      {id:"dirn",label:"Direction",type:"select",options:["","RCV","TRMT","BTH"],required:false},
      {id:"tmper",label:"Time Period",type:"select",options:["","15-MIN","1-DAY"],required:false},
    ]},
  RTRV_PM:{label:"RTRV-PM",category:"Performance",description:"Retrieve performance monitoring counters",vendors:ALL,
    template:"RTRV-PM-{aid_type}:[{tid}]:{aid}:{ctag}::{montype},{monlev},{locn},{dirn},{tmper},{mondat},{montm};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid_type",label:"AID Type",type:"select",options:["ALL","T1","T3","DS0","DS1","DS3","OC3","OC12","OC48","OC192","ETH","STS1","STS3C","VT1","DWDM","DSG"],required:true},
      {id:"aid",label:"AID",type:"text",placeholder:"1-1-1",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
      {id:"montype",label:"Monitor Type",type:"select",options:["ALL","ES","SES","UAS","CV","AISS","OPR","OPT","OPIN","DBYTE","FEBBE","FECV","FESES","FEUAS","FECS","EFS","CSES","PJCDET","PJCGEN","SEFL","FEC-CORR","FEC-UNCORR","OSNR","CD","PMD","Q-FACTOR","BER","PRE-FEC-BER"],required:false},
      {id:"monlev",label:"Monitor Level",type:"text",placeholder:"0-UP",required:false},
      {id:"locn",label:"Location",type:"select",options:["","NEND","FEND"],required:false},
      {id:"dirn",label:"Direction",type:"select",options:["","RCV","TRMT","BTH"],required:false},
      {id:"tmper",label:"Time Period",type:"select",options:["","15-MIN","1-DAY"],required:false},
      {id:"mondat",label:"Monitor Date",type:"text",placeholder:"MM-DD",required:false},
      {id:"montm",label:"Monitor Time",type:"text",placeholder:"HH-MM",required:false},
    ]},
  RTRV_HDR:{label:"RTRV-HDR",category:"System",description:"Retrieve NE header and identification",vendors:ALL,
    template:"RTRV-HDR:[{tid}]::{ctag};",
    params:[{id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},{id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true}]},
  RTRV_NETYPE:{label:"RTRV-NETYPE",category:"System",description:"Retrieve network element type and software version",vendors:ALL,
    template:"RTRV-NETYPE:[{tid}]::{ctag};",
    params:[{id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},{id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true}]},
  INIT_SYS:{label:"INIT-SYS",category:"System",description:"Initialize system — warm or cold reboot",vendors:ALL,
    template:"INIT-SYS:[{tid}]::{ctag}:::{phase};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
      {id:"phase",label:"Init Phase",type:"select",options:["1","2","3"],required:true,help:"1=Warm restart  2=Cold restart  3=Full init"},
    ]},
  SET_DAT:{label:"SET-DAT",category:"System",description:"Set NE date and time",vendors:ALL,
    template:"SET-DAT:[{tid}]::{ctag}:::{date},{time};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
      {id:"date",label:"Date (YY-MM-DD)",type:"text",placeholder:"26-05-18",required:true},
      {id:"time",label:"Time (HH-MM-SS)",type:"text",placeholder:"14-30-00",required:true},
    ]},
  ACT_USER:{label:"ACT-USER",category:"Security",description:"Activate / login a user session",vendors:ALL,
    template:"ACT-USER:[{tid}]:{uid}:{ctag}::{pid};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"uid",label:"User ID",type:"text",placeholder:"ADMIN",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
      {id:"pid",label:"Password",type:"password",placeholder:"••••••••",required:true},
    ]},
  CANC_USER:{label:"CANC-USER",category:"Security",description:"Cancel / logout user session",vendors:ALL,
    template:"CANC-USER:[{tid}]:{uid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"uid",label:"User ID",type:"text",placeholder:"ADMIN",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  RTRV_EQPT:{label:"RTRV-EQPT",category:"Equipment",description:"Retrieve equipment inventory for a slot or shelf",vendors:ALL,
    template:"RTRV-EQPT:[{tid}]:{aid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID (Slot)",type:"text",placeholder:"ALL or SHELF-1-SLOT-3",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  ED_EQPT:{label:"ED-EQPT",category:"Equipment",description:"Edit equipment provisioning attributes",vendors:SONET,
    template:"ED-EQPT:[{tid}]:{aid}:{ctag}:::{eqpttype},{apsr},{ains},{protid},{prtype};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID (Slot)",type:"text",placeholder:"SHELF-1-SLOT-3",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
      {id:"eqpttype",label:"Equipment Type",type:"text",placeholder:"OC192-XFP",required:false},
      {id:"apsr",label:"Auto-Prov State",type:"select",options:["","YES","NO"],required:false},
      {id:"ains",label:"Alarm Inhibit State",type:"select",options:["","YES","NO"],required:false},
      {id:"protid",label:"Protection ID",type:"text",placeholder:"PROT-1",required:false},
      {id:"prtype",label:"Protection Type",type:"select",options:["","1+1","1:1","UNEQUIP"],required:false},
    ]},
  ED_SHELF:{label:"ED-SHELF",category:"Equipment",description:"Edit shelf attributes and name",vendors:SONET,
    template:"ED-SHELF:[{tid}]:{aid}:{ctag}:::{shelftype},{shelfname};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"Shelf AID",type:"text",placeholder:"SHELF-1",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
      {id:"shelftype",label:"Shelf Type",type:"text",placeholder:"MAIN",required:false},
      {id:"shelfname",label:"Shelf Name",type:"text",placeholder:"CO-EAST-A",required:false,help:"Descriptive label for this shelf."},
    ]},
  DLT_EQPT:{label:"DLT-EQPT",category:"Equipment",description:"Delete provisioned card or equipment from a slot",vendors:ALL,
    template:"DLT-EQPT:[{tid}]:{aid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID (Slot)",type:"text",placeholder:"SHELF-1-SLOT-3",required:true,help:"Delete all facilities and cross-connects from this card first."},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  DLT_SHELF:{label:"DLT-SHELF",category:"Equipment",description:"Delete an expansion shelf from the NE",vendors:SONET,
    template:"DLT-SHELF:[{tid}]:{aid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"Shelf AID",type:"text",placeholder:"SHELF-2",required:true,help:"All slots must be empty before shelf deletion."},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  DLT_PORT:{label:"DLT-PORT",category:"Equipment",description:"Delete / de-provision a port",vendors:ALL,
    template:"DLT-PORT:[{tid}]:{aid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"Port AID",type:"text",placeholder:"FAC-1-1-1",required:true,help:"Remove all facilities and cross-connects from port first."},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  RTRV_T1:{label:"RTRV-T1",category:"Facility",description:"Retrieve T1 facility parameters",vendors:["generic","ciena","adtran","calix","daxs5","daxs4"],
    template:"RTRV-T1:[{tid}]:{aid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID",type:"text",placeholder:"T1-1-1-1 or ALL",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  ED_T1:{label:"ED-T1",category:"Facility",description:"Edit T1 facility parameters",vendors:["generic","ciena","adtran","calix","daxs5","daxs4"],
    template:"ED-T1:[{tid}]:{aid}:{ctag}:::{linecde},{fmt},{lbo},{tacc},{taptype},{sfber},{sdber},{ains},{ainstmr},{inact};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID",type:"text",placeholder:"T1-1-1-1",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
      {id:"linecde",label:"Line Code",type:"select",options:["","AMI","B8ZS"],required:false},
      {id:"fmt",label:"Framing Format",type:"select",options:["","SF","ESF","UNFR"],required:false},
      {id:"lbo",label:"Line Build Out",type:"select",options:["","0-133FT","133-266FT","266-399FT","399-533FT","533-655FT"],required:false},
      {id:"tacc",label:"Test Access",type:"select",options:["","Y","N"],required:false},
      {id:"taptype",label:"TAP Type",type:"select",options:["","BRIDGED","SPLIT"],required:false},
      {id:"sfber",label:"SF BER Threshold",type:"select",options:["","1E-3","1E-4","1E-5"],required:false},
      {id:"sdber",label:"SD BER Threshold",type:"select",options:["","1E-5","1E-6","1E-7","1E-8","1E-9"],required:false},
      {id:"ains",label:"Auto-in-Service",type:"select",options:["","Y","N"],required:false},
      {id:"ainstmr",label:"AINS Timer (hrs)",type:"text",placeholder:"0-96",required:false},
      {id:"inact",label:"Inactive State",type:"select",options:["","OOS-MA,MT","OOS-MA,LPBK"],required:false},
    ]},
  DLT_T1:{label:"DLT-T1",category:"Facility",description:"Delete T1 facility provisioning",vendors:["generic","ciena","adtran","calix","daxs5","daxs4"],
    template:"DLT-T1:[{tid}]:{aid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID",type:"text",placeholder:"T1-1-1-1",required:true,help:"Remove all cross-connects before deletion."},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  RTRV_T3:{label:"RTRV-T3",category:"Facility",description:"Retrieve T3 facility parameters",vendors:SONET,
    template:"RTRV-T3:[{tid}]:{aid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID",type:"text",placeholder:"T3-1-1-1 or ALL",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  ED_T3:{label:"ED-T3",category:"Facility",description:"Edit T3 facility parameters",vendors:SONET,
    template:"ED-T3:[{tid}]:{aid}:{ctag}:::{linecde},{sfber},{sdber},{ains},{ainstmr},{inact};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID",type:"text",placeholder:"T3-1-1-1",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
      {id:"linecde",label:"Line Code",type:"select",options:["","B3ZS","NRZ"],required:false},
      {id:"sfber",label:"SF BER Threshold",type:"select",options:["","1E-3","1E-4","1E-5"],required:false},
      {id:"sdber",label:"SD BER Threshold",type:"select",options:["","1E-5","1E-6","1E-7","1E-8","1E-9"],required:false},
      {id:"ains",label:"Auto-in-Service",type:"select",options:["","Y","N"],required:false},
      {id:"ainstmr",label:"AINS Timer (hrs)",type:"text",placeholder:"0-96",required:false},
      {id:"inact",label:"Inactive State",type:"select",options:["","OOS-MA,MT","OOS-MA,LPBK"],required:false},
    ]},
  DLT_T3:{label:"DLT-T3",category:"Facility",description:"Delete T3 facility provisioning",vendors:SONET,
    template:"DLT-T3:[{tid}]:{aid}:{ctag};",
    params:[
      {id:"tid",label:"Target ID (TID)",type:"text",placeholder:"NE-01",required:false},
      {id:"aid",label:"AID",type:"text",placeholder:"T3-1-1-1",required:true},
      {id:"ctag",label:"Correlation Tag",type:"text",placeholder:"1",required:true},
    ]},
  RTRV_DS0:{label:"RTRV-DS0",category:"TDM",description:"Retrieve DS0 channel parameters and status",vendors:ALL,
    template:"RTRV-DS0:[{tid}]:{aid}:{ctag};",

const isNortel=v=>v==="daxs5"||v==="daxs4";

function App(){
  const [vendor,setVendor]=useState("generic");
  const [selCmd,setSelCmd]=useState("RTRV_ALM");
  const [params,setParams]=useState({});
  const [history,setHistory]=useState([]);
  const [tab,setTab]=useState("params");
  const [search,setSearch]=useState("");
  const [copied,setCopied]=useState(false);

  const cmdDef=COMMANDS[selCmd];

  const filteredCmds=useMemo(()=>{
    const base=Object.entries(COMMANDS).filter(([,d])=>d.vendors.includes(vendor));
    if(!search)return base;
    const q=search.toLowerCase();
    return base.filter(([,d])=>d.label.toLowerCase().includes(q)||d.description.toLowerCase().includes(q)||d.category.toLowerCase().includes(q));
  },[vendor,search]);

  const grouped=useMemo(()=>{
    const g={};
    filteredCmds.forEach(([k,d])=>{(g[d.category]=g[d.category]||[]).push([k,d]);});
    return g;
  },[filteredCmds]);

  const built=useMemo(()=>{
    if(!cmdDef)return"";
    let cmd=cmdDef.template;
    cmdDef.params.forEach(p=>{
      const v=params[p.id]||"";
      cmd=p.id==="tid"?cmd.replace("[{tid}]",v):cmd.replace("{"+p.id+"}",v);
    });
    return cmd;
  },[cmdDef,params]);

  const setP=(id,v)=>setParams(prev=>({...prev,[id]:v}));
  const clear=()=>setParams({});
  const save=()=>{if(!built)return;setHistory(p=>[{cmd:built,label:cmdDef.label,ts:new Date().toLocaleTimeString()},...p.slice(0,49)]);};
  const copy=()=>navigator.clipboard.writeText(built).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1600);});
  const pick=k=>{setSelCmd(k);setParams({});setTab("params");};

  const renderTmpl=()=>cmdDef.template.split(/(\{[^}]+\}|\[[^\]]+\])/g).map((p,i)=>
    (p[0]==="{"||p[0]==="[")?<span key={i} className="tmpl-hl">{p}</span>:<span key={i}>{p}</span>
  );

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="logo">TL1 Builder</div>
          <div className="logo-sub">Multi-Vendor Command Generator</div>
        </div>
        <div className="vendor-row">
          {Object.entries(VENDORS).map(([k,v])=>(
            <button key={k}
              className={"vendor-chip"+(vendor===k?" active":"")+(isNortel(k)?" nortel-chip":"")}
              onClick={()=>{setVendor(k);setSelCmd(null);setParams({});}}>
              {v.label}
            </button>
          ))}
        </div>
        <div className="search-wrap">
          <input className="search-input" placeholder="Filter commands…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div className="cmd-list">
          {Object.entries(grouped).map(([cat,cmds])=>(
            <div key={cat}>
              <div className="cat-label">{cat}</div>
              {cmds.map(([k,d])=>(
                <div key={k} className={"cmd-item"+(selCmd===k?" active":"")} onClick={()=>pick(k)}>
                  <div className="cmd-name">{d.label}</div>
                  <div className="cmd-desc">{d.description}</div>
                </div>
              ))}
            </div>
          ))}
          {!Object.keys(grouped).length&&<div className="no-match">No commands match.</div>}
        </div>
      </div>

      <div className="main">
        {cmdDef?(
          <>
            <div className="top-bar">
              <div className="top-title">{cmdDef.label}</div>
              <div className="top-desc">{cmdDef.description}</div>
              <div className="vendor-badges">
                {cmdDef.vendors.map(v=>(
                  <span key={v} className={"vbadge"+(isNortel(v)?" nortel":"")}>{VENDORS[v]&&VENDORS[v].label}</span>
                ))}
              </div>
            </div>
            <div className="content">
              <div className="params-panel">
                <div className="tabs">
                  <button className={"tab"+(tab==="params"?" active":"")} onClick={()=>setTab("params")}>Parameters</button>
                  <button className={"tab"+(tab==="template"?" active":"")} onClick={()=>setTab("template")}>Template</button>
                  <button className={"tab"+(tab==="history"?" active":"")} onClick={()=>setTab("history")}>History<span className="cbadge">{history.length}</span></button>
                </div>
                {tab==="params"&&(
                  <>
                    {cmdDef.params.map(p=>(
                      <div key={p.id} className="param-group">
                        <div className="param-label">{p.label}{p.required&&<span className="param-req">*</span>}</div>
                        {p.type==="select"
                          ?<select className="param-select" value={params[p.id]||""} onChange={e=>setP(p.id,e.target.value)}>
                              {p.options.map(o=><option key={o} value={o}>{o===""?"— leave blank —":o}</option>)}
                            </select>
                          :<input className="param-input" type={p.type==="password"?"password":"text"}
                              placeholder={p.placeholder} value={params[p.id]||""}
                              onChange={e=>setP(p.id,e.target.value)}/>
                        }
                        {p.help&&<div className="param-help">{p.help}</div>}
                      </div>
                    ))}
                    <div className="actions"><button className="btn btn-clr" onClick={clear}>Clear</button></div>
                  </>
                )}
                {tab==="template"&&(
                  <div className="tmpl-box">
                    <div className="sec-title">Command Template</div>
                    <div className="tmpl-txt">{renderTmpl()}</div>
                  </div>
                )}
                {tab==="history"&&(
                  history.length===0
                    ?<div style={{fontSize:"11px",color:"#484f58"}}>No commands saved yet.</div>
                    :history.map((h,i)=>(
                        <div key={i} className="hist-item" onClick={()=>navigator.clipboard.writeText(h.cmd)} title="Click to copy">
                          <div className="hist-cmd">{h.cmd}</div>
                          <div className="hist-meta">{h.label} · {h.ts}</div>
                        </div>
                      ))
                )}
              </div>
              <div className="output-panel">
                <div className="sec-title">Generated Command</div>
                <div className="output-box">
                  {built?<div className="cmd-out">{built}</div>:<div className="cmd-ph">Fill in parameters to generate command…</div>}
                </div>
                <div className="actions">
                  <button className="btn btn-ok" onClick={copy}>Copy Command</button>
                  <span className={"copy-ok"+(copied?" show":"")}>✓ Copied!</span>
                  <button className="btn btn-sec" onClick={save}>Save to History</button>
                </div>
              </div>
            </div>
          </>
        ):(
          <div className="empty-st">SELECT A COMMAND</div>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
